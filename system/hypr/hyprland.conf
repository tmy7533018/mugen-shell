source = colors.conf

### MONITORS ###
# Generic fallback — works on any single or multi-monitor setup.
# To customize, run `hyprctl monitors` and replace with your own entries.
monitor = , preferred, auto, 1

workspace = 1, persistent:true, default:true
workspace = 2, persistent:true

### MY PROGRAMS / USER AUTOSTART ###
source = ~/.config/hypr/configs/autostart.conf

### IME ###
# Comment this out if you don't use fcitx5 (or swap for your own ime.conf).
source = ~/.config/hypr/configs/ime.conf

### MUGEN-SHELL AUTOSTART ###
# Pulled into a separate file so users with an existing hyprland.conf can
# adopt just this snippet (`source = ~/.config/hypr/configs/mugen-shell.conf`)
# without copying everything else here.
source = ~/.config/hypr/configs/mugen-shell.conf

### ENVIRONMENT VARIABLES ###
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

### LOOK AND FEEL ###
source= ~/.config/hypr/configs/looknfeel.conf

### ANIMATIONS ###
source= ~/.config/hypr/configs/UserAnimations.conf

### WINDOWRULES AND LAYERRULES ###
source = ~/.config/hypr/configs/windowrules.conf

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = false
    vrr = 1
}

render {
	new_render_scheduling = true
}

### INPUT ###
source= ~/.config/hypr/configs/input.conf

### KEYBINDS ###
source= ~/.config/hypr/configs/keybinds.conf

cursor {
  no_warps = false
}
