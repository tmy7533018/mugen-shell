# Autostart bits required by mugen-shell. Sourced from hyprland.conf on a
# fresh install; users who already have their own hyprland.conf can pull
# this single file into their setup by adding one line:
#
#     source = ~/.config/hypr/configs/mugen-shell.conf
#
# That way mugen-shell stays one cohesive snippet they can opt into without
# losing their existing config.

# Hand the compositor's address to systemd, then pull up the session target:
# graphical-session.target refuses a manual start, so user services bound to
# it (yura-voice, aivisspeech-engine) only run once something binds to it on
# their behalf.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start mugen-shell-session.target
exec-once = sh -lc 'sleep 1; ~/.config/hypr/scripts/wallp-restore.sh'
exec-once = quickshell -c mugen-shell
exec-once = quickshell -p ~/.config/quickshell/mugen-shell/yura-shell.qml
exec-once = ~/.config/quickshell/mugen-shell/scripts/blur-preset.sh boot
exec-once = ~/.config/hypr/scripts/hypridle-auto-start.sh
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent
