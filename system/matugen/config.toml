[config.wallpaper]
command = "swww"
arguments = ["img", "--transition-type", "any", "--transition-fps", "60"]
set = false

[templates.hyprland]
input_path  = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook   = 'hyprctl reload'

# Lua-config counterpart of the above; consumed by hyprland.lua when the Lua
# config is active. Harmless under the legacy config (nothing sources it). The
# `hyprctl reload` on the template above re-runs the Lua config (re-dofiling this
# file), so no post_hook is needed here.
[templates.hyprland-lua]
input_path  = '~/.config/matugen/templates/hyprland-colors.lua'
output_path = '~/.config/hypr/colors.lua'

[templates.gtk3]
input_path  = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path  = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.kitty]
input_path  = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'
post_hook   = "kill -SIGUSR1 $(pidof kitty)"

[templates.cava]
input_path  = '~/.config/matugen/templates/matugen-cava'
output_path = '~/.config/cava/themes/colors.conf'
post_hook   = "pkill -USR1 cava"

[templates.quickshell-json]
input_path = '~/.config/matugen/templates/quickshell-colors.json'
output_path = '~/.cache/mugen-shell/colors.json'
