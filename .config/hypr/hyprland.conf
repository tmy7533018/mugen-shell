source = colors.conf

### MONITORS ###
# Generic fallback — works on any single or multi-monitor setup.
# To customize, run `hyprctl monitors` and replace with your own entries.
monitor = , preferred, auto, 1

workspace = 1, persistent:true, default:true
workspace = 2, persistent:true

### MY PROGRAMS ###
$terminal = kitty
$fileManager = thunar

### AUTOSTART ###
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = fcitx5 -d --replace
exec-once = sh -c 'pgrep -x nm-applet >/dev/null || (env GDK_BACKEND=x11 GDK_SCALE=1 GDK_DPI_SCALE=1 nm-applet --indicator)'
exec-once = sh -lc 'sleep 1; ~/.config/hypr/scripts/wallp-restore.sh'
exec-once = sudo ~/.config/hypr/scripts/sddm-random-video.sh

exec-once = quickshell -c mugen-shell
exec-once = apply-gsettings
exec-once = ~/.config/hypr/scripts/hypridle-auto-start.sh
exec-once = xrdb -load ~/.Xresources
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

### ENVIRONMENT VARIABLES ###
env = PATH,$HOME/.local/bin:$HOME/go/bin:/usr/local/bin:/usr/bin:/bin
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = XDG_CURRENT_DESKTOP,Hyprland
env = GTK_THEME,Colloid-Grey-Dark
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

### LOOK AND FEEL ###
source= ~/.config/hypr/configs/looknfeel.conf

### ANIMATIONS ###
source= ~/.config/hypr/configs/UserAnimations.conf

### WINDOWRULES AND LAYERRULES ###
source = ~/.config/hypr/configs/windowrules.conf

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = false
    vrr = 1
}

render {
	new_render_scheduling = true
}

### INPUT ###
source= ~/.config/hypr/configs/input.conf

### KEYBINDS ###
source= ~/.config/hypr/configs/keybinds.conf

cursor {
  no_warps = false
}
