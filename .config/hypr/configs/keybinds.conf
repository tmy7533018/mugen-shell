$mod = SUPER
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, backspace, killactive
bind = $mainMod, N, exec, env thunar
bind = $mainMod, P, pseudo
bind = $mainMod SHIFT, P, togglesplit
bind = $mainMod SHIFT, M, exec, zen-browser --new-window="https://music.youtube.com/"
bind = $mainMod, B, exec, zen-browser

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window switch (same workspace): cycle windows and bring to front
bind = $mainMod, Tab, exec, hyprctl dispatch cyclenext && hyprctl dispatch bringactivetotop
bind = $mainMod SHIFT, Tab, exec, hyprctl dispatch cyclenext prev && hyprctl dispatch bringactivetotop

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move to workspace with ALT + SHIFT + num
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5

# Move window to workspace with mainMod + SHIFT + num
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# Workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume keys
bind = ,122, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = ,123, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = ,121, exec, pamixer --toggle-mute; notify-send "Volume: Toggle-mute" -t 500
bind = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle; notify-send "System Mic: Toggle-mute" -t 500

# Fullscreen
bind = $mainMod, F, fullscreen

# Screenshots
bind = $mainMod, F12, exec, ~/.config/quickshell/mugen-shell/scripts/take-screenshot.sh
bind = ,Print, exec, ~/.config/quickshell/mugen-shell/scripts/take-screenshot.sh

# Move window (arrows)
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r

bind = $mainMod SHIFT, mouse:272, togglefloating

# Special workspace
bind = $mainMod SHIFT, S, togglespecialworkspace, magic

# Media keys
bind = ,172, exec, playerctl play-pause
bind = ,171, exec, playerctl next
bind = ,173, exec, playerctl previous

# Mugen Shell modules
bind = $mainMod, R, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh launcher
bind = $mainMod, W, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh wallpaper
bind = $mainMod, L, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh powermenu
bind = $mainMod, M, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh music
bind = $mainMod, T, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh notification
bind = $mainMod, A, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh ai
bind = $mainMod, V, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh clipboard
bind = $mainMod, C, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh calendar
bind = $mainMod, S, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh screenshot-gallery
bind = $mainMod, U, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh volume
bind = $mainMod, H, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh wifi
bind = $mainMod, J, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh bluetooth
bind = $mainMod, comma, exec, ~/.config/quickshell/mugen-shell/scripts/mugen-shell-ipc.sh settings

# Idle inhibitor toggle
bind = $mainMod SHIFT, I, exec, ~/.config/quickshell/mugen-shell/scripts/idle_inhibitor.sh

# Blur preset picker (rofi required)
bind = $mainMod SHIFT, B, exec, bash -c '~/.config/quickshell/mugen-shell/scripts/blur-preset.sh "$(~/.config/quickshell/mugen-shell/scripts/blur-preset.sh list | rofi -dmenu -p "Blur preset")"'
